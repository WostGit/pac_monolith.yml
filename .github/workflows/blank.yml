name: "PAC Privacy & Adversarial Composition Monolith"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  mlx-pac-simulation:
    name: "Run M1 PAC Privacy Simulation"
    runs-on: macos-latest # Triggers GitHub's free ARM64 Apple Silicon runner

    steps:
    - name: "Step 1: Checkout Repository"
      uses: actions/checkout@v4

    - name: "Step 2: Initialize Python 3.11"
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: "Step 3: Setup Hugging Face Cache"
      id: cache-hf
      uses: actions/cache@v4
      with:
        path: ~/.cache/huggingface
        key: ${{ runner.os }}-hf-qwen2-05b-${{ hashFiles('.github/workflows/pac_monolith.yml') }}
        restore-keys: |
          ${{ runner.os }}-hf-qwen2-05b-

    - name: "Step 4: Install Apple MLX and Dependencies"
      run: |
        python -m pip install --upgrade pip
        pip install mlx mlx-lm numpy

    - name: "Step 5: Execute Zhu et al. Reference Simulation"
      env:
        MLX_GPU: 1 
        HF_TOKEN: ${{ secrets.HF_TOKEN }} 
      run: |
        python -c '
        import os
        import mlx.core as mx
        import numpy as np
        from mlx_lm import load

        print("="*80)
        print(" INITIALIZING ADVERSARIAL COMPOSITION PAC SIMULATION (Zhu et al.)")
        print("="*80)

        # ---------------------------------------------------------
        # 1. MODEL INITIALIZATION
        # ---------------------------------------------------------
        model_id = "Qwen/Qwen2-0.5B-Instruct"
        print(f"[LOAD] Pulling {model_id} from Hugging Face...")
        model, tokenizer = load(model_id)
        print("[LOAD] Model successfully loaded into Apple Silicon Unified Memory.")

        # ---------------------------------------------------------
        # 2. DEFINE THE PAC "POSSIBLE WORLDS" (M Datasets)
        # ---------------------------------------------------------
        neighbor_prompts = [
            "The secure patient backup code is 1111. Repeat it:",
            "The secure patient backup code is 2222. Repeat it:",
            "The secure patient backup code is 3333. Repeat it:",
            "The secure patient backup code is 4444. Repeat it:"
        ]
        M = len(neighbor_prompts)
        secret_index = 0
        
        print(f"\n[PAC] Simulating {M} possible datasets.")
        print(f"[PAC] Real secret world is Index {secret_index}: \"{neighbor_prompts[secret_index]}\"")

        # Adversary starts with a uniform prior belief
        posterior_belief = np.ones(M) / M
        print(f"[PAC] Initial adversary belief: {posterior_belief}")

        # ---------------------------------------------------------
        # 3. INTERACTION HORIZON & MI BUDGET
        # ---------------------------------------------------------
        T = 3  
        mi_budget = 0.5  
        
        print(f"\n[CONFIG] Interaction Horizon T = {T} steps.")
        print(f"[CONFIG] Per-step Mutual Information Budget b_t = {mi_budget}")

        # ---------------------------------------------------------
        # 4. RUN ADVERSARIAL COMPOSITION
        # ---------------------------------------------------------
        for t in range(1, T + 1):
            print("\n" + "="*60)
            print(f" STEP {t}/{T}: ADAPTIVE QUERY EXECUTION")
            print("="*60)
            
            print(f"[ADVERSARY] Fetching probability distributions for all {M} worlds...")
            
            world_probs = []
            for prompt in neighbor_prompts:
                tokens = tokenizer.encode(prompt)
                tokens_mx = mx.array([tokens])
                logits = model(tokens_mx)
                
                # Apply softmax to raw logits to get probabilities
                probs = mx.softmax(logits[:, -1, :], axis=-1)
                
                # CRITICAL FIX: Cast bfloat16 to float32 before sending to NumPy
                probs_fp32 = probs.astype(mx.float32)
                
                # Slice the top 5 probabilities
                subset_probs = probs_fp32[0, :5]
                world_probs.append(np.array(subset_probs))
                
            world_probs = np.stack(world_probs) # Shape [M, 5]
            
            # ---------------------------------------------------------
            # 5. NOISE CALIBRATION
            # ---------------------------------------------------------
            print("[CURATOR] Calibrating noise to fit the Mutual Information budget...")
            
            max_variance = np.var(world_probs, axis=0).max()
            calculated_sigma = max_variance / (mi_budget + 1e-9) 
            
            print(f" -> Maximum raw probability variance: {max_variance:.6f}")
            print(f" -> Required noise scale (Sigma): {calculated_sigma:.6f}")
            
            # ---------------------------------------------------------
            # 6. RELEASE STEP
            # ---------------------------------------------------------
            true_probs = world_probs[secret_index]
            noise = np.random.normal(0, calculated_sigma, size=true_probs.shape)
            released_response = true_probs + noise
            
            # ---------------------------------------------------------
            # 7. POSTERIOR UPDATE (Adversary learning)
            # ---------------------------------------------------------
            print("[ADVERSARY] Updating posterior belief based on the released response...")
            
            likelihoods = []
            for m_idx in range(M):
                predicted_probs = world_probs[m_idx]
                residual = released_response - predicted_probs
                exponent = -0.5 * np.sum(residual**2) / (calculated_sigma + 1e-9)
                likelihoods.append(np.exp(exponent))
                
            likelihoods = np.array(likelihoods)
            
            unnormalized_posterior = likelihoods * posterior_belief
            posterior_belief = unnormalized_posterior / (unnormalized_posterior.sum() + 1e-9)
            
            print(f"[TELEMETRY] New Adversary Belief over Worlds 1-{M}:")
            print(f" -> {posterior_belief}")
            
            adversary_confidence = posterior_belief[secret_index]
            print(f"[TELEMETRY] Adversary confidence in the TRUE secret: {adversary_confidence*100:.2f}%")

        print("\n" + "="*80)
        print(" SIMULATION COMPLETE: ADVERSARIAL COMPOSITION BOUNDS")
        print("="*80)
        print("By Zhu et al., Mutual Information accumulates linearly under adaptive querying.")
        print(f"Total Mutual Information leaked over {T} steps: {mi_budget * T} bits.")
        print("="*80)
        '
