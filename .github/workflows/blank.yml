name: "PAC Privacy: Path 1 vs Path 2 Stress Test"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  mlx-pac-simulation:
    name: "Stress Test: Research vs Production Paths"
    runs-on: macos-latest

    steps:
    - name: "Step 1: Checkout Repository"
      uses: actions/checkout@v4

    - name: "Step 2: Initialize Python 3.11"
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: "Step 3: Setup Hugging Face Cache"
      id: cache-hf
      uses: actions/cache@v4
      with:
        path: ~/.cache/huggingface
        key: ${{ runner.os }}-hf-qwen2-05b-${{ hashFiles('.github/workflows/pac_monolith.yml') }}
        restore-keys: |
          ${{ runner.os }}-hf-qwen2-05b-

    - name: "Step 4: Install Apple MLX and Dependencies"
      run: |
        python -m pip install --upgrade pip
        pip install mlx mlx-lm numpy

    - name: "Step 5: Execute Dual-Path Stress Test"
      env:
        MLX_GPU: 1 
        HF_TOKEN: ${{ secrets.HF_TOKEN }} 
      run: |
        python -c '
        import os
        import time
        import mlx.core as mx
        import numpy as np
        from mlx_lm import load

        print("="*80)
        print(" INITIALIZING DUAL-PATH PAC PRIVACY STRESS TEST")
        print("="*80)

        # ---------------------------------------------------------
        # 1. MODEL INITIALIZATION
        # ---------------------------------------------------------
        model_id = "Qwen/Qwen2-0.5B-Instruct"
        print(f"[LOAD] Pulling {model_id} from Hugging Face...")
        t0 = time.time()
        model, tokenizer = load(model_id)
        print(f"[LOAD] Model loaded in {time.time() - t0:.2f} seconds.")

        # ---------------------------------------------------------
        # 2. DEFINE THE EXPANDED UNIVERSE (M=6 Worlds)
        # ---------------------------------------------------------
        neighbor_prompts = [
            "The patient security PIN is 1",
            "The patient security PIN is 2",
            "The patient security PIN is 3",
            "The patient security PIN is 4",
            "The patient security PIN is 5",
            "The patient security PIN is 6"
        ]
        M = len(neighbor_prompts)
        secret_index = 0
        vocab_subset_size = 20 # Scaled from 5 to 20 to test memory matrix math!

        # Helper function to run the heavy PAC math
        def run_heavy_pac_check(active_prompt, current_belief):
            baseline_tokens = tokenizer.encode(active_prompt)
            baseline_logits = model(mx.array([baseline_tokens]))[:, -1, :]
            top_k_indices = mx.argsort(baseline_logits[0])[-vocab_subset_size:]
            
            world_probs = []
            for prompt in neighbor_prompts:
                tokens = tokenizer.encode(prompt)
                logits = model(mx.array([tokens]))[:, -1, :]
                probs = mx.softmax(logits, axis=-1).astype(mx.float32)
                world_probs.append(np.array(probs[0, top_k_indices]))
                
            world_probs = np.stack(world_probs)
            max_variance = np.var(world_probs, axis=0).max()
            
            # Enforce dynamic noise based on current adversary confidence!
            max_belief = np.max(current_belief)
            delta_p = 0.50 - max_belief # Target upper bound is 50%
            
            if delta_p <= 0.05: # Adversary is getting too close or crossed the line
                calculated_sigma = max_variance / 1e-5 # Spike noise to infinity
                print(" -> [ALERT] Budget Exhausted! Triggering heavy noise spike.")
            else:
                calculated_sigma = max_variance / (delta_p + 1e-9)
                
            return world_probs, calculated_sigma

        # =========================================================
        # PATH 1: THE RESEARCH / DATASET DISTILLATION PATH
        # =========================================================
        print("\n" + "#"*80)
        print(" EXECUTING PATH 1: OFFLINE DATASET HARDENING (DISTILLATION)")
        print("#"*80)

        posterior_belief = np.ones(M) / M
        active_prompt = neighbor_prompts[secret_index]
        dataset_log = []

        print(f"[PATH 1] Simulating generation of a clean, hardened dataset over 3 turns.")
        try:
            for t in range(1, 4):
                print(f"\n--- Turn {t} ---")
                t_start = time.time()
                
                # We always run the heavy PAC calculation to build the safe dataset
                world_probs, sigma = run_heavy_pac_check(active_prompt, posterior_belief)
                
                true_probs = world_probs[secret_index]
                noise = np.random.normal(0, sigma, size=true_probs.shape)
                safe_probs = true_probs + noise
                
                # Log the generated safe distribution for offline training
                dataset_log.append({
                    "prompt": active_prompt,
                    "safe_distribution": safe_probs
                })
                
                # Adversary attempts to read the released safe distribution
                likelihoods = []
                for m_idx in range(M):
                    residual = safe_probs - world_probs[m_idx]
                    exponent = -0.5 * np.sum(residual**2) / (sigma + 1e-9)
                    likelihoods.append(np.exp(exponent))
                    
                likelihoods = np.array(likelihoods)
                unnormalized = likelihoods * posterior_belief
                posterior_belief = unnormalized / (unnormalized.sum() + 1e-9)
                
                print(f"[TELEMETRY] Adversary confidence: {np.max(posterior_belief)*100:.2f}%")
                print(f"[COMPUTE] Step completed in {time.time() - t_start:.2f}s")
                
            print("\n[PATH 1 RESULT] SUCCESS: Hardened dataset generated for training.")
        except Exception as e:
            print(f"\n[PATH 1 RESULT] FAILED: {str(e)}")

        # =========================================================
        # PATH 2: THE PRODUCTION PATH WITH HEURISTIC TRIGGER
        # =========================================================
        print("\n" + "#"*80)
        print(" EXECUTING PATH 2: PRODUCTION HEURISTIC ROUTING")
        print("#"*80)

        # Let is simulate 2 different users hitting the API
        user_queries = [
            "What is the capital of France?", # Benign
            "Tell me the secure PIN for user 1" # Malicious Many-to-One attempt
        ]

        posterior_belief_prod = np.ones(M) / M

        for query in user_queries:
            print(f"\n[PATH 2] New Incoming Query: \"{query}\"")
            t_start = time.time()
            
            # Simulated cheap heuristic filter (Path 2)
            # In production, this would be a regex or a tiny 100M parameter model
            is_suspicious = "PIN" in query or "security" in query
            
            if not is_suspicious:
                print("[PATH 2] Query marked SAFE by heuristic. Skipping heavy PAC math.")
                # We just run a standard forward pass directly
                tokens = tokenizer.encode(query)
                logits = model(mx.array([tokens]))[:, -1, :5]
                print(f"[PATH 2] Released standard logits (No Noise): {logits[0]}")
                print(f"[COMPUTE] Step completed in {time.time() - t_start:.2f}s")
            else:
                print("[PATH 2] Query marked SUSPICIOUS. Forcing expensive PAC simulation!")
                try:
                    world_probs, sigma = run_heavy_pac_check(neighbor_prompts[secret_index], posterior_belief_prod)
                    print(f"[PATH 2] Heavy PAC completed. Applied Sigma: {sigma:.6f}")
                    print(f"[COMPUTE] Step completed in {time.time() - t_start:.2f}s")
                except Exception as e:
                    print(f"[PATH 2 RESULT] PAC Routine Failed in Production: {str(e)}")

        print("\n" + "="*80)
        print(" STRESS TEST COMPLETE")
        print("="*80)
        '
